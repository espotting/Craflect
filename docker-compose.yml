version: '3.8'
services:
  app:
    build: .
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://craflect:${DB_PASSWORD}@postgres:5432/craflect
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - postgres
      - redis
      - ollama
    volumes:
      - ./thumbnails:/app/thumbnails
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./thumbnails:/app/thumbnails
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - app
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot

  workers:
    build: .
    command: npm run workers
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://craflect:${DB_PASSWORD}@postgres:5432/craflect
      - REDIS_HOST=redis
      - OLLAMA_HOST=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOBSTR_API_KEY=${LOBSTR_API_KEY}
      - APIFY_API_KEY=${APIFY_API_KEY}
    depends_on:
      - postgres
      - redis
      - ollama
    volumes:
      - ./thumbnails:/app/thumbnails
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=craflect
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=craflect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: always

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  certbot_certs:
  certbot_webroot:
